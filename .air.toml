#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
bin = "./tmp/main"
cmd = "go build -o ./tmp/main ."
delay = 1000
entrypoint = ["./tmp/main"]
exclude_dir = ["assets", "tmp", "vendor", "testdata", "static"]
exclude_file = []
exclude_regex = ["_test.go", ".*_templ.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
ignore_dangerous_root_dir = false
include_dir = ["views", "styles"]
include_ext = ["go", "tpl", "tmpl", "html", "templ", "css"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = [
  "templ generate",
  "./tailwindcss -i ./styles/tailwind.css -o ./static/css/styles.css",
]
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = true

[build.windows]
args_bin = []
bin = "tmp\\main.exe"
cmd = "go build -o ./tmp/main.exe ."
entrypoint = ["tmp\\main.exe"]
full_bin = ""
post_cmd = []
pre_cmd = [
  "templ generate",
  ".\\tailwindcss.exe -i .\\styles\\tailwind.css -o .\\static\\css\\styles.css",
]

[color]
app = ""
build = "yellow"
main = "magenta"
mode = ""
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
enabled = true
proxy_port = 8090
app_port = 8443
app_start_timeout = 5000
# Point Air proxy to your generated certs
cert_file = "certs/localhost+2.pem"
key_file = "certs/localhost+2-key.pem"

[screen]
clear_on_rebuild = false
keep_scroll = true
