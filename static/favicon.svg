<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <defs>
        <clipPath id="fav-globe">
            <circle cx="16" cy="16" r="11"/>
        </clipPath>
    </defs>

    <!-- Stamp outer ring -->
    <circle cx="16" cy="16" r="15" fill="#0f3460" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="2.5 1.5"/>

    <!-- Globe -->
    <circle cx="16" cy="16" r="11" fill="#1a1a2e"/>

    <!-- Globe grid -->
    <g clip-path="url(#fav-globe)" stroke="#48cae4" fill="none" opacity="0.45">
        <line x1="5" y1="11" x2="27" y2="11" stroke-width="0.6"/>
        <line x1="5" y1="16" x2="27" y2="16" stroke-width="0.8"/>
        <line x1="5" y1="21" x2="27" y2="21" stroke-width="0.6"/>
        <path d="M16 5 Q23 16 16 27" stroke-width="0.6"/>
        <path d="M16 5 Q9 16 16 27" stroke-width="0.6"/>
        <line x1="16" y1="5" x2="16" y2="27" stroke-width="0.6"/>
    </g>

    <!-- Flight arc -->
    <path d="M7 22 Q15 7 24 12" stroke="#e9c46a" stroke-width="1" stroke-dasharray="2 1.5" fill="none"/>

    <!-- Plane -->
    <g transform="translate(24,12) rotate(-30)">
        <path d="M0-3 L1.1-1 L4.5 0 L1.1 0.5 L0.7 3.5 L0 2 L-0.7 3.5 L-1.1 0.5 L-4.5 0 L-1.1-1Z" fill="#e94560"/>
